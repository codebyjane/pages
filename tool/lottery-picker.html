<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../design-system.css">

<title>線上抽獎</title>

<style>
/* lottery-picker 專用樣式 */
textarea{
    width:100%;
    min-height:220px;
    resize:vertical;

    padding:14px;
    border-radius:var(--r-md);
    border:1px solid var(--border);

    font-size:14px;
    font-family:inherit;
    background:#fff;
}

.winner-display{
    text-align:center;
    font-size:32px;
    font-weight:700;
    min-height:60px;
    margin:20px 0;
}

.winner-list{
    margin-top:16px;
}

.winner-item{
    background:#fff;
    border-radius:14px;
    padding:12px 16px;
    margin-bottom:10px;
}

.stats{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
}

.stat-card{
    flex:1;
    min-width:120px;
    background:#fff;
    border-radius:16px;
    padding:16px;
    text-align:center;
}

.stat-value{
    font-size:24px;
    font-weight:600;
}

.stat-label{
    color:var(--muted);
    font-size:12px;
}

</style>
</head>

<body>

<div class="page">

    <div class="page-header">
        <h1>🎲 線上抽獎</h1>
        <div class="subtitle">隨機抽出幸運得主</div>
    </div>

    <div class="grid grid-2">

        <!-- 左側 -->
        <div class="section">

            <h3>參加名單</h3>

            <textarea
                id="nameList"
                placeholder="每行一位&#10;王小明&#10;陳小華&#10;李小美"></textarea>

            <div class="hint">
                每行輸入一位參加者，或點擊右側「⚡ 產生名單」自動產生
            </div>

        </div>

        <!-- 右側 -->
        <div class="section">

            <h3>抽獎設定</h3>

            <label>中獎人數</label>

            <input
                type="number"
                id="winnerCount"
                value="1"
                min="1">

            <div id="autoCountWrap" style="display:none;">
                <label>產生數量</label>
                <input
                    type="number"
                    id="autoCount"
                    value="10"
                    min="1"
                    max="999">
            </div>

            <div class="timer-actions">

                <button
                    class="primary"
                    onclick="startLottery()">
                    🎲 開始抽獎
                </button>

                <button
                    class="secondary"
                    onclick="showAutoCountDialog()">
                    ⚡ 產生名單
                </button>

                <button
                    class="secondary"
                    onclick="clearData()">
                    清除
                </button>

            </div>

        </div>

    </div>

    <!-- 動畫 -->
    <div class="section">

        <h3>抽獎過程</h3>

        <div
            id="rollingName"
            class="winner-display">
            準備抽獎
        </div>

    </div>

    <!-- 結果 -->
    <div class="section">

        <h3>🏆 中獎名單</h3>

        <div id="winnerList" class="winner-list"></div>

    </div>

    <!-- 統計 -->
    <div class="section">

        <div class="stats">

            <div class="stat-card">
                <div id="participantCount"
                     class="stat-value">0</div>
                <div class="stat-label">
                    參加人數
                </div>
            </div>

            <div class="stat-card">
                <div id="winnerCountDisplay"
                     class="stat-value">0</div>
                <div class="stat-label">
                    中獎人數
                </div>
            </div>

        </div>

    </div>

</div>

<script>

const STORAGE_NAMES = "lottery.names";
const STORAGE_COUNT = "lottery.count";

/* ---------- 初始化 ---------- */

          loadData();

/* ---------- 開始抽獎 ---------- */

function startLottery(){

    const names =
        getNames();

    const winnerCount =
        parseInt(
            document.getElementById(
                "winnerCount"
            ).value
        );

    if(names.length === 0){

        alert("請輸入參加名單");
        return;
    }

    if(winnerCount > names.length){

        alert("中獎人數不能大於參加人數");
        return;
    }

    saveData();

    animateLottery(
        names,
        winnerCount
    );

    document.getElementById(
        "rollingName"
    ).scrollIntoView({
        behavior: "smooth",
        block: "center"
    });
}

/* ---------- 動畫 ---------- */

function animateLottery(
    names,
    winnerCount
){

    const rolling =
        document.getElementById(
            "rollingName"
        );

    let drawn = 0;
    let remaining = [...names];

    function drawOne(){

        if(drawn >= winnerCount){
            return;
        }

        const interval =
            setInterval(()=>{

                const randomName =
                    remaining[
                        Math.floor(
                            Math.random() *
                            remaining.length
                        )
                    ];

                rolling.textContent =
                    randomName;

            },80);

        setTimeout(()=>{

            clearInterval(interval);

            const winnerIndex =
                Math.floor(
                    Math.random() *
                    remaining.length
                );

            const winner =
                remaining.splice(winnerIndex, 1)[0];

            rolling.textContent =
                winner;

            drawn++;

            showResult(
                [winner],
                drawn
            );

            if(drawn < winnerCount){

                setTimeout(drawOne, 3000);
            }

        },2000);
    }

    drawOne();
}

/* ---------- 抽獎 ---------- */

function drawWinners(
    names,
    count
){

    const shuffled =
        [...names];

    for(
        let i =
            shuffled.length-1;
        i>0;
        i--
    ){

        const j =
            Math.floor(
                Math.random() *
                (i+1)
            );

        [
            shuffled[i],
            shuffled[j]
        ] =
        [
            shuffled[j],
            shuffled[i]
        ];
    }

    return shuffled.slice(
        0,
        count
    );
}

/* ---------- 顯示結果 ---------- */

 function showResult(
    winners,
    currentCount
){

    const container =
        document.getElementById(
            "winnerList"
        );

    winners.forEach(
        (winner)=>{

        const div =
            document.createElement(
                "div"
            );

        div.className =
            "winner-item";

        div.innerHTML =
            `🏆 ${currentCount}. ${winner}`;

        container.appendChild(
            div
        );
    });

    document.getElementById(
        "winnerCountDisplay"
    ).textContent =
        currentCount;
}

/* ---------- 名單 ---------- */

function getNames(){

    return document
        .getElementById(
            "nameList"
        )
        .value
        .split("\n")
        .map(v=>v.trim())
        .filter(v=>v);
}

/* ---------- 儲存 ---------- */

    function saveData(){

    localStorage.setItem(
        STORAGE_NAMES,
        document.getElementById(
            "nameList"
        ).value
    );

    localStorage.setItem(
        STORAGE_COUNT,
        document.getElementById(
            "winnerCount"
        ).value
    );

    localStorage.setItem(
        "lottery.autoCount",
        document.getElementById(
            "autoCount"
        ).value
    );
}

/* ---------- 載入 ---------- */

   function loadData(){

    const names =
        localStorage.getItem(
            STORAGE_NAMES
        );

    const count =
        localStorage.getItem(
            STORAGE_COUNT
        );

    if(names){

        document.getElementById(
            "nameList"
        ).value =
            names;
    }

    if(count){

        document.getElementById(
            "winnerCount"
        ).value =
            count;
    }

    updateStats();
}

/* ---------- 清除 ---------- */

function clearData(){

    if(
        !confirm(
            "確定清除資料？"
        )
    ){
        return;
    }

    localStorage.removeItem(
        STORAGE_NAMES
    );

    localStorage.removeItem(
        STORAGE_COUNT
    );

    localStorage.removeItem(
        "lottery.autoCount"
    );

    location.reload();
}

/* ---------- 統計 ---------- */

document
    .getElementById(
        "nameList"
    )
    .addEventListener(
        "input",
        updateStats
    );

     function updateStats(){

    const names =
        getNames();

    document.getElementById(
        "participantCount"
    ).textContent =
        names.length;
}

/* ---------- 產生名單 ---------- */

function showAutoCountDialog(){

    const count = prompt("請輸入產生數量：", "10");
    if(count === null) return;

    const num = parseInt(count);
    if(isNaN(num) || num < 1){

        alert("請輸入有效的數量");
        return;
    }

    const names = [];
    for(let i = 1; i <= num; i++){
        names.push(`No.${i}`);
    }

    document.getElementById("nameList").value =
        names.join("\n");

    updateStats();
}


</script>

</body>
</html>
