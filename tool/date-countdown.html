<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../design-system.css">

<title>日期倒數</title>

<style>
.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.countdown{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:16px;
    margin-top:20px;
}

.item{
    background:white;
    border-radius:20px;
    padding:20px;
    text-align:center;
}

.number{
    font-size:36px;
    font-weight:700;
}

.label{
    margin-top:8px;
    color:#666;
}

.message{
    margin-top:20px;
    font-size:20px;
    font-weight:600;
}
</style>

</head>

<body>
<div class="page">

    <div class="page-header">
        <h1>📅 日期倒數</h1>
		<div class="subtitle"></div>
    </div>

    <div class="section">
		<div class="form-group">
			<label>目標日期時間</label>
			<input type="datetime-local" id="targetDate">
		</div>

		<button class="primary" onclick="startCountdown()">
			開始倒數
		</button>

		<div class="result">

			<div class="countdown">

				<div class="item">
					<div class="number" id="days">0</div>
					<div class="label">天</div>
				</div>

				<div class="item">
					<div class="number" id="hours">0</div>
					<div class="label">小時</div>
				</div>

				<div class="item">
					<div class="number" id="minutes">0</div>
					<div class="label">分鐘</div>
				</div>

				<div class="item">
					<div class="number" id="seconds">0</div>
					<div class="label">秒</div>
				</div>

			</div>

			<div class="message" id="message"></div>

		</div>
    </div>

</div>

<script>

let timer = null;

function startCountdown() {

    const input = document.getElementById("targetDate").value;

    if (!input) {
        alert("請選擇日期");
        return;
    }

    const targetDate = new Date(input);

    if (timer) {
        clearInterval(timer);
    }

    updateCountdown(targetDate);

    timer = setInterval(() => {
        updateCountdown(targetDate);
    }, 1000);
}

function updateCountdown(targetDate) {

    const now = new Date();

    const diff = targetDate - now;

    if (diff <= 0) {

        document.getElementById("days").textContent = 0;
        document.getElementById("hours").textContent = 0;
        document.getElementById("minutes").textContent = 0;
        document.getElementById("seconds").textContent = 0;

        document.getElementById("message").textContent =
            "🎉 已到達目標日期";

        clearInterval(timer);

        return;
    }

    const days =
        Math.floor(diff / (1000 * 60 * 60 * 24));

    const hours =
        Math.floor(
            (diff % (1000 * 60 * 60 * 24))
            / (1000 * 60 * 60)
        );

    const minutes =
        Math.floor(
            (diff % (1000 * 60 * 60))
            / (1000 * 60)
        );

    const seconds =
        Math.floor(
            (diff % (1000 * 60))
            / 1000
        );

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = hours;
    document.getElementById("minutes").textContent = minutes;
    document.getElementById("seconds").textContent = seconds;

    document.getElementById("message").textContent =
        `距離 ${targetDate.toLocaleString()} 還有`;
}

</script>

</body>
</html>
