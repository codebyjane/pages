<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../design-system.css">

<title>倒數計時器</title>

<style>
.timer-display{
    text-align:center;
    font-size:80px;
    font-weight:700;
    margin:30px 0;
}

.message{
    margin-top:20px;
    text-align:center;
    font-size:18px;
    font-weight:600;
}
</style>
</head>
<body>
<div class="page">

    <div class="page-header">
        <h1>⏳ 倒數計時器</h1>
        <div class="subtitle"></div>
    </div>

    <div class="section">
		<div class="mode-selector">

			<button class="mode-btn" onclick="setTimer(1)">
				1 分鐘
			</button>

			<button class="mode-btn" onclick="setTimer(5)">
				5 分鐘
			</button>

			<button class="mode-btn" onclick="setTimer(10)">
				10 分鐘
			</button>

			<button class="mode-btn" onclick="setTimer(30)">
				30 分鐘
			</button>

		</div>

		<div class="timer-display" id="display" style="text-align:center;font-size:80px;font-weight:700;margin:30px 0;">
			00:00
		</div>

		<div class="timer-actions">

			<button class="primary" onclick="startTimer()">
				開始
			</button>

			<button class="secondary" onclick="pauseTimer()">
				暫停
			</button>

			<button class="secondary" onclick="resetTimer()">
				重設
			</button>

		</div>

		<div class="message" id="message" style="margin-top:20px;text-align:center;font-size:18px;font-weight:600;"></div>
    </div>

</div>

<script>

let totalSeconds = 0;
let remainingSeconds = 0;
let timer = null;

function setTimer(minutes){

    totalSeconds = minutes * 60;
    remainingSeconds = totalSeconds;

    updateDisplay();

    document.getElementById("message").textContent =
        `${minutes} 分鐘已設定`;
}

function updateDisplay(){

    const minutes =
        Math.floor(remainingSeconds / 60);

    const seconds =
        remainingSeconds % 60;

    document.getElementById("display").textContent =
        `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
}

function startTimer(){

    if(remainingSeconds <= 0){
        return;
    }

    if(timer){
        return;
    }

    document.getElementById("message").textContent =
        "倒數中...";

    timer = setInterval(() => {

        remainingSeconds--;

        updateDisplay();

        if(remainingSeconds <= 0){

            clearInterval(timer);
            timer = null;

            document.getElementById("message").textContent =
                "🎉 時間到！";

            alert("時間到！");
        }

    },1000);
}

function pauseTimer(){

    clearInterval(timer);
    timer = null;

    document.getElementById("message").textContent =
        "已暫停";
}

function resetTimer(){

    clearInterval(timer);

    timer = null;

    remainingSeconds = totalSeconds;

    updateDisplay();

    document.getElementById("message").textContent =
        "已重設";
}

</script>

</body>
</html>
